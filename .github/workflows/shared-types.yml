# Source: 01-RESEARCH.md Standard Stack — Node 22 + pnpm + tsc only (no tests yet — DTOs
# are generated by plan 01-15; behavioural tests live in apps/web Pest).
name: shared-types

on:
  push:
    branches: [main, develop, master]
    paths:
      - 'packages/shared-types/**'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.github/workflows/shared-types.yml'
  pull_request:
    paths:
      - 'packages/shared-types/**'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.github/workflows/shared-types.yml'

jobs:
  shared-types:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: pnpm install (workspace)
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @trenchwars/shared-types typecheck
