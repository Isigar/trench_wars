# Source: 01-RESEARCH.md Standard Stack — Node 22 + pnpm + tsc + vitest + eslint.
name: bot

on:
  push:
    branches: [main, develop, master]
    paths:
      - 'apps/bot/**'
      - 'packages/shared-types/**'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.github/workflows/bot.yml'
  pull_request:
    paths:
      - 'apps/bot/**'
      - 'packages/shared-types/**'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.github/workflows/bot.yml'

jobs:
  bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: pnpm install (workspace)
        run: pnpm install --no-frozen-lockfile

      - name: Build workspace deps (shared-types)
        run: pnpm --filter @trenchwars/shared-types build

      - name: Typecheck
        run: pnpm --filter @trenchwars/bot typecheck

      - name: Lint
        run: pnpm --filter @trenchwars/bot lint

      - name: Test
        run: pnpm --filter @trenchwars/bot test
