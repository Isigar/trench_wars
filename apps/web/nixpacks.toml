# Nixpacks build config for the Railway `web` service. The `ssr`, `worker`, and
# `scheduler` services share this same image (same Root Directory apps/web) and
# override the start command per-service in the Railway dashboard:
#   ssr        → php artisan inertia:start-ssr
#   worker     → php artisan horizon
#   scheduler  → php artisan schedule:work
#
# Source: 01-RESEARCH.md Pitfall 6 + Nixpacks PHP provider docs.
# Targeted at Railway nixpacks builder with `apps/web` set as the service Root Directory.
#
# Required Railway service env (set per service in dashboard):
#   NIXPACKS_PHP_ROOT_DIR=/app/public   (so Caddy serves from public/)
#
# See: .planning/milestones/v1.0-phases/01-foundations/RAILWAY-DEPLOY.md for the operator walkthrough.

[phases.setup]
nixPkgs = [
    "php84",
    "php84Extensions.intl",
    "php84Extensions.pdo_pgsql",
    "php84Extensions.redis",
    "php84Extensions.gd",
    "php84Extensions.bcmath",
    "php84Extensions.zip",
    "php84Extensions.mbstring",
    "php84Extensions.pcntl",
    "php84Extensions.exif",
    "php84Extensions.opcache",
    "nodejs_22",
    "pnpm",
]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-progress",
    "pnpm install --no-frozen-lockfile",
]

[phases.build]
cmds = [
    "pnpm run build",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache",
]

[start]
# Default (the `web` service): php-fpm + Caddy via the Nixpacks PHP provider
# (auto-wired when NIXPACKS_PHP_ROOT_DIR=/app/public is set on the Railway service).
# Same-image sibling services override this start command in the dashboard:
#   worker     → php artisan horizon
#   scheduler  → php artisan schedule:work
#   ssr        → php artisan inertia:start-ssr
cmd = "/start-server.sh"
