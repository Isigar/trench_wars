# Source: D-021 (LOCKED) — all five Railway services + Postgres + Redis containerized for local dev.
# Per CONTEXT.md Specific Ideas: bind-mount apps/web; vendor/ + node_modules in named volumes; named pg_data + redis_data.
# Per .docs/02-architecture.md Services table.
name: trenchwars

services:
  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    container_name: trenchwars-web
    working_dir: /app
    volumes:
      - ./apps/web:/app
      - web_vendor:/app/vendor
      - web_node_modules:/app/node_modules
      # Plan 01-06: expose repo-root tsconfig.base.json at the path apps/web/tsconfig.json's
      # "extends": "../../tsconfig.base.json" resolves to (= /tsconfig.base.json from /app).
      - ./tsconfig.base.json:/tsconfig.base.json:ro
    environment:
      # Plan 01-06: APP_* env keys removed from compose injection. They were defaulting to
      # empty/local from the host shell (no root .env exists), and Laravel's Env::get() reads
      # $_SERVER first — so the empty APP_KEY shadowed apps/web/.env's real key, producing
      # MissingAppKeyException at runtime (the curl 500 — Plan 01-05 only fixed the test path
      # via phpunit.xml <server> tags). Letting Laravel read from apps/web/.env directly is
      # the canonical solution for local dev. Production overrides via Railway env groups.
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-trenchwars}
      DB_USERNAME: ${DB_USERNAME:-trenchwars}
      DB_PASSWORD: ${DB_PASSWORD:-trenchwars}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-null}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      CACHE_STORE: ${CACHE_STORE:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      DISCORD_REDIRECT_URI: ${DISCORD_REDIRECT_URI:-http://localhost:8000/auth/discord/callback}
      LOG_DEPRECATIONS_CHANNEL: ${LOG_DEPRECATIONS_CHANNEL:-null}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [trenchwars]

  web-nginx:
    image: nginx:1.27-alpine
    container_name: trenchwars-nginx
    ports:
      - "8000:80"
    volumes:
      - ./apps/web:/app:ro
      - ./docker/web/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nginx -t || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks: [trenchwars]

  bot:
    build:
      context: .
      dockerfile: docker/bot/Dockerfile
    container_name: trenchwars-bot
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_APPLICATION_ID: ${DISCORD_APPLICATION_ID:-}
      WEB_API_URL: ${WEB_API_URL:-http://web-nginx}
      WEB_API_TOKEN: ${WEB_API_TOKEN:-}
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep node > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks: [trenchwars]

  rcon-worker:
    build:
      context: .
      dockerfile: docker/rcon-worker/Dockerfile
    container_name: trenchwars-rcon-worker
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      WEB_HMAC_SECRET: ${WEB_HMAC_SECRET:-}
      WEB_INTERNAL_URL: ${WEB_INTERNAL_URL:-http://web-nginx}
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep node > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks: [trenchwars]

  postgres:
    image: postgres:16-alpine
    container_name: trenchwars-postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE:-trenchwars}
      POSTGRES_USER: ${DB_USERNAME:-trenchwars}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-trenchwars}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT_HOST:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-trenchwars} -d ${DB_DATABASE:-trenchwars}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [trenchwars]

  redis:
    image: redis:7-alpine
    container_name: trenchwars-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT_HOST:-6379}:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [trenchwars]

volumes:
  pg_data:
  redis_data:
  web_vendor:
  web_node_modules:

networks:
  trenchwars:
    driver: bridge
