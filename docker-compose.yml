# Source: D-021 (LOCKED) — all five Railway services + Postgres + Redis containerized for local dev.
# Per CONTEXT.md Specific Ideas: bind-mount apps/web; vendor/ + node_modules in named volumes; named pg_data + redis_data.
# Per .docs/02-architecture.md Services table.
name: trenchwars

services:
  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    container_name: trenchwars-web
    working_dir: /app
    volumes:
      - ./apps/web:/app
      - web_vendor:/app/vendor
      - web_node_modules:/app/node_modules
      # Plan 01-06: expose repo-root tsconfig.base.json at the path apps/web/tsconfig.json's
      # "extends": "../../tsconfig.base.json" resolves to (= /tsconfig.base.json from /app).
      - ./tsconfig.base.json:/tsconfig.base.json:ro
      # Plan 01-15: bind-mount packages/shared-types so trenchwars:typescript-generate can
      # sync the emitted api.d.ts to /repo/packages/shared-types/src/api.d.ts (D-020).
      - ./packages/shared-types:/repo/packages/shared-types
      # Plan 07-11: expose docker-compose.yml read-only so SsrBundleExistsTest can parse
      # it via Symfony\Component\Yaml\Yaml to assert the ssr service registration.
      - ./docker-compose.yml:/repo/docker-compose.yml:ro
    environment:
      # Plan 01-06: APP_* env keys removed from compose injection. They were defaulting to
      # empty/local from the host shell (no root .env exists), and Laravel's Env::get() reads
      # $_SERVER first — so the empty APP_KEY shadowed apps/web/.env's real key, producing
      # MissingAppKeyException at runtime (the curl 500 — Plan 01-05 only fixed the test path
      # via phpunit.xml <server> tags). Letting Laravel read from apps/web/.env directly is
      # the canonical solution for local dev. Production overrides via Railway env groups.
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-trenchwars}
      DB_USERNAME: ${DB_USERNAME:-trenchwars}
      DB_PASSWORD: ${DB_PASSWORD:-trenchwars}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-null}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      CACHE_STORE: ${CACHE_STORE:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      DISCORD_REDIRECT_URI: ${DISCORD_REDIRECT_URI:-http://localhost:8000/auth/discord/callback}
      LOG_DEPRECATIONS_CHANNEL: ${LOG_DEPRECATIONS_CHANNEL:-null}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [trenchwars]

  web-nginx:
    image: nginx:1.27-alpine
    container_name: trenchwars-nginx
    ports:
      - "8000:80"
    volumes:
      - ./apps/web:/app:ro
      - ./docker/web/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nginx -t || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks: [trenchwars]

  # Plan 05-01 (Phase 5): Horizon worker. Pitfall 8 recommendation A — D-021 dev-prod
  # parity (Railway's web/bot/rcon-worker/postgres/redis 5-service topology adds the
  # worker as a 6th when Horizon is in play). Uses the same docker/web/Dockerfile so
  # the PHP+composer image is reused; named volume web_vendor shared with `web`.
  worker:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    container_name: trenchwars-worker
    working_dir: /app
    command: ["php", "artisan", "horizon"]
    volumes:
      - ./apps/web:/app
      - web_vendor:/app/vendor
      - ./packages/shared-types:/repo/packages/shared-types
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-trenchwars}
      DB_USERNAME: ${DB_USERNAME:-trenchwars}
      DB_PASSWORD: ${DB_PASSWORD:-trenchwars}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-null}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      CACHE_STORE: ${CACHE_STORE:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      LOG_DEPRECATIONS_CHANNEL: ${LOG_DEPRECATIONS_CHANNEL:-null}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Healthcheck note: docker/web/Dockerfile is php-fpm Alpine-derived and does NOT
    # include the procps package, so `pgrep` is unavailable. PID 1 is the
    # `php artisan horizon` master process — inspect its /proc/1/cmdline instead.
    healthcheck:
      test: ["CMD-SHELL", "tr '\\0' ' ' < /proc/1/cmdline | grep -q 'artisan horizon' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks: [trenchwars]

  bot:
    build:
      context: .
      dockerfile: docker/bot/Dockerfile
    container_name: trenchwars-bot
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_APPLICATION_ID: ${DISCORD_APPLICATION_ID:-}
      WEB_API_URL: ${WEB_API_URL:-http://web-nginx}
      WEB_API_TOKEN: ${WEB_API_TOKEN:-}
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep node > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks: [trenchwars]

  rcon-worker:
    build:
      context: .
      dockerfile: docker/rcon-worker/Dockerfile
    container_name: trenchwars-rcon-worker
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      WEB_HMAC_SECRET: ${WEB_HMAC_SECRET:-}
      WEB_INTERNAL_URL: ${WEB_INTERNAL_URL:-http://web-nginx}
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep node > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks: [trenchwars]

  # Plan 07-11 (Phase 7): Inertia v2 SSR Node sidecar. RESEARCH Pattern 5 Option B —
  # Open Question 7 LOCKED inline RESOLVED (split service for prod-parity over
  # worker-co-host). SC-3 ("SSR enabled in production for first paint on public
  # pages") + REQ-success-public-browse. Uses the same docker/web/Dockerfile so
  # the PHP image is reused; `php artisan inertia:start-ssr` is the long-running
  # process (Inertia v2 ships the artisan command). Internal-only: ports: [] so
  # the Node process is never exposed to the host network (T-07-11-04 mitigation).
  # Dev defaults to off — operator opts in via `docker compose up ssr`; production
  # turns it on via Railway env group INERTIA_SSR_ENABLED=true (D-014).
  ssr:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    container_name: trenchwars-ssr
    working_dir: /app
    command: ["php", "artisan", "inertia:start-ssr"]
    volumes:
      - ./apps/web:/app
      - web_vendor:/app/vendor
    environment:
      # Service-level overrides — these affect ONLY the ssr container, not the web
      # service default which stays env-driven (INERTIA_SSR_ENABLED=false in dev).
      INERTIA_SSR_ENABLED: "true"
      INERTIA_SSR_URL: "http://0.0.0.0:13714"
      APP_ENV: "${APP_ENV:-production}"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-trenchwars}
      DB_USERNAME: ${DB_USERNAME:-trenchwars}
      DB_PASSWORD: ${DB_PASSWORD:-trenchwars}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-null}
      LOG_DEPRECATIONS_CHANNEL: ${LOG_DEPRECATIONS_CHANNEL:-null}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:13714/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # T-07-11-04 mitigation — internal docker network only; the Node SSR process
    # is reachable from the `web` service via http://ssr:13714 (docker service-name
    # DNS) but never from the host.
    ports: []
    networks: [trenchwars]

  postgres:
    image: postgres:16-alpine
    container_name: trenchwars-postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE:-trenchwars}
      POSTGRES_USER: ${DB_USERNAME:-trenchwars}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-trenchwars}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT_HOST:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-trenchwars} -d ${DB_DATABASE:-trenchwars}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [trenchwars]

  redis:
    image: redis:7-alpine
    container_name: trenchwars-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT_HOST:-6379}:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [trenchwars]

volumes:
  pg_data:
  redis_data:
  web_vendor:
  web_node_modules:

networks:
  trenchwars:
    driver: bridge
