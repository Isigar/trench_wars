; Source: 01-RESEARCH.md Common Pitfalls 9 + dev defaults
memory_limit = 512M
upload_max_filesize = 20M
post_max_size = 20M
max_execution_time = 60
date.timezone = UTC

; Opcache — dev settings (production overrides via env later)
opcache.enable = 1
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0

; Suppress deprecation noise from Filament v3 internals (Pitfall 9)
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
